<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Anime Emporium - Contacto</title>
  <link rel="stylesheet" href="estilos.css">
  <link rel="icon" href="imagenes/logo.jpeg">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="imagenes/logo.jpeg" alt="Anime Emporium Logo" class="logo-img">
      </a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="catalogo.html">Catálogo</a></li>
      <li><a href="mangas.html">Mangas</a></li>
      <li><a href="contacto.html" class="active">Contacto</a></li>
      <li class="carrito">
        <a href="carrito.html">🛒 Carrito (<span id="contador-carrito">0</span>)</a>
      </li>
    </ul>
  </nav>

  <!-- Contenido Contacto -->
  <main class="ventana">
    <h1 class="titulo-contacto">📩 Contáctanos</h1>
    <section class="formulario-contacto">
      <form action="#" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" required>

        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje" rows="5" required></textarea>

        <button type="submit" class="btn-carrito">Enviar mensaje</button>
      </form>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© ANIME EMPORIUM | Todos los derechos reservados</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
